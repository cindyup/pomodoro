<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>番茄钟</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #1a1a2e; color: #eee;
  }
  .container {
    text-align: center; padding: 40px;
    background: #16213e; border-radius: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    width: 420px;
  }
  h1 { font-size: 20px; font-weight: 600; letter-spacing: 2px; color: #e94560; margin-bottom: 8px; }
  .mode-tabs {
    display: flex; gap: 4px; background: #0f3460; border-radius: 12px; padding: 4px;
    margin-bottom: 28px;
  }
  .mode-tab {
    flex: 1; padding: 8px 0; border: none; border-radius: 10px;
    background: transparent; color: #888; font-size: 14px; cursor: pointer;
    transition: all 0.2s;
  }
  .mode-tab.active { background: #e94560; color: #fff; font-weight: 600; }
  .mode-tab:not(.active):hover { color: #ddd; }

  .timer-ring { position: relative; width: 260px; height: 260px; margin: 0 auto 24px; }
  .timer-ring svg { transform: rotate(-90deg); }
  .timer-ring .bg { fill: none; stroke: #0f3460; stroke-width: 6; }
  .timer-ring .progress {
    fill: none; stroke: #e94560; stroke-width: 6; stroke-linecap: round;
    transition: stroke-dashoffset 0.3s;
  }
  .timer-text {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    justify-content: center; align-items: center;
  }
  .timer-display { font-size: 56px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: 4px; }
  .phase-label { font-size: 14px; color: #888; margin-top: 4px; }

  .controls { display: flex; gap: 12px; justify-content: center; margin-bottom: 24px; }
  .btn {
    padding: 12px 32px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; min-width: 100px;
  }
  .btn:active { transform: scale(0.95); }
  .btn-primary { background: #e94560; color: #fff; }
  .btn-primary:hover { background: #d63851; }
  .btn-success { background: #2ecc71; color: #fff; }
  .btn-success:hover { background: #27ae60; }
  .btn-secondary { background: #0f3460; color: #aaa; }
  .btn-secondary:hover { background: #1a4a7a; color: #eee; }
  .btn-danger { background: transparent; color: #555; padding: 12px 16px; min-width: auto; }
  .btn-danger:hover { color: #e94560; }

  .stats { display: flex; gap: 24px; justify-content: center; padding-top: 20px; border-top: 1px solid #0f3460; }
  .stat { text-align: center; }
  .stat-value { font-size: 22px; font-weight: 700; color: #e94560; }
  .stat-label { font-size: 12px; color: #666; margin-top: 2px; }

  .settings { display: flex; gap: 12px; justify-content: center; margin-bottom: 16px; padding: 12px; background: #0f3460; border-radius: 12px; }
  .setting { display: flex; align-items: center; gap: 6px; }
  .setting.hidden { display: none; }
  .setting label { font-size: 12px; color: #888; }
  .setting input {
    width: 52px; padding: 4px 8px; border: 1px solid #1a4a7a; border-radius: 6px;
    background: #16213e; color: #eee; font-size: 14px; text-align: center; outline: none;
  }
  .setting input:focus { border-color: #e94560; }
  .setting input::-webkit-inner-spin-button { opacity: 1; }
  .task-input-wrap { display: flex; gap: 8px; margin-bottom: 16px; }
  .task-input-wrap input {
    flex: 1; padding: 10px 14px; border: 1px solid #0f3460; border-radius: 10px;
    background: #0f3460; color: #eee; font-size: 14px; outline: none;
  }
  .task-input-wrap input::placeholder { color: #555; }
  .task-input-wrap input:focus { border-color: #e94560; }
  .task-input-wrap button {
    padding: 10px 16px; border: none; border-radius: 10px; background: #e94560;
    color: #fff; font-size: 18px; cursor: pointer;
  }

  .task-list { list-style: none; text-align: left; margin-bottom: 16px; max-height: 140px; overflow-y: auto; }
  .task-list::-webkit-scrollbar { width: 4px; }
  .task-list::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 4px; }
  .task-item {
    display: flex; align-items: center; gap: 8px; padding: 6px 8px;
    border-radius: 8px; font-size: 13px; color: #aaa;
  }
  .task-item:hover { background: #0f3460; }
  .task-item input[type="checkbox"] { accent-color: #e94560; }
  .task-item .label { flex: 1; }
  .task-item.done .label { text-decoration: line-through; color: #444; }
  .task-item.selected { background: #1a3a5a; border-left: 3px solid #e94560; border-radius: 8px 4px 4px 8px; }
  .task-item .session-badge { font-size: 11px; color: #e94560; white-space: nowrap; margin-right: 2px; }
  .task-item .del { background: none; border: none; color: #555; cursor: pointer; padding: 2px 6px; font-size: 14px; }
  .task-item .del:hover { color: #e94560; }
  .task-item.done { display: none; }
  .task-list.show-done .task-item.done { display: flex; }
  .done-toggle { text-align: center; padding: 6px; font-size: 12px; color: #666; cursor: pointer; border-radius: 8px; margin-bottom: 8px; user-select: none; }
  .done-toggle:hover { color: #aaa; background: #0f3460; }

  .notification { display: none; position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
    background: #e94560; color: #fff; padding: 14px 28px; border-radius: 12px;
    font-weight: 600; box-shadow: 0 8px 32px rgba(233,69,96,0.3); z-index: 100;
    animation: slideDown 0.3s ease;
  }
  @keyframes slideDown { from { transform: translateX(-50%) translateY(-20px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }

  /* 周报 */
  .weekly-sidebar {
    position: fixed; left: 0; top: 50%; transform: translateY(-50%); z-index: 50;
    background: #e94560; color: #fff; padding: 12px 6px;
    border-radius: 0 8px 8px 0; cursor: pointer; writing-mode: vertical-rl;
    font-size: 13px; font-weight: 600; letter-spacing: 2px;
    transition: all 0.2s; user-select: none;
  }
  .weekly-sidebar:hover { background: #d63851; padding-right: 10px; }
  .weekly-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 90; }
  .weekly-overlay.open { display: block; }
  .weekly-panel {
    position: fixed; top: 0; left: -420px; width: 400px; height: 100vh;
    background: #16213e; z-index: 91; transition: left 0.3s ease;
    box-shadow: 4px 0 30px rgba(0,0,0,0.4); padding: 28px 24px;
    overflow-y: auto; color: #eee;
  }
  .weekly-panel.open { left: 0; }
  .weekly-panel::-webkit-scrollbar { width: 4px; }
  .weekly-panel::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 4px; }
  .weekly-panel h2 { font-size: 18px; color: #e94560; margin-bottom: 4px; }
  .weekly-panel .week-range { font-size: 13px; color: #888; margin-bottom: 20px; }
  .weekly-panel .close-btn {
    position: absolute; top: 16px; right: 16px;
    background: none; border: none; color: #888;
    font-size: 22px; cursor: pointer; padding: 4px 8px;
  }
  .weekly-panel .close-btn:hover { color: #e94560; }
  .weekly-panel .total-stat { text-align: center; padding: 16px; background: #0f3460; border-radius: 12px; margin-bottom: 20px; }
  .weekly-panel .total-stat .value { font-size: 32px; font-weight: 700; color: #e94560; }
  .weekly-panel .total-stat .label { font-size: 12px; color: #888; margin-top: 2px; }
  .weekly-panel .section { margin-bottom: 16px; }
  .weekly-panel .section h3 { font-size: 14px; color: #aaa; margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px solid #0f3460; }
  .weekly-panel .chart-bar { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 8px; font-size: 13px; }
  .weekly-panel .chart-bar:hover { background: #0f3460; }
  .weekly-panel .chart-bar .name { flex: 0 0 auto; width: 80px; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; }
  .weekly-panel .chart-bar .bar-track { flex: 1; height: 18px; background: #0f3460; border-radius: 9px; overflow: hidden; position: relative; }
  .weekly-panel .chart-bar .bar-fill { height: 100%; border-radius: 9px; min-width: 2px; transition: width 0.4s ease; }
  .weekly-panel .chart-bar .bar-label { flex: 0 0 auto; font-size: 11px; color: #e94560; white-space: nowrap; text-align: right; min-width: 52px; }
  .weekly-panel .archive-content .chart-bar .name { color: #666; }
  .weekly-panel .archive-content .chart-bar .bar-label { color: #555; }
  .weekly-panel .empty-msg { font-size: 13px; color: #555; text-align: center; padding: 16px; }
  .weekly-panel .archive-toggle { text-align: center; padding: 8px; font-size: 13px; color: #888; cursor: pointer; border-radius: 8px; }
  .weekly-panel .archive-toggle:hover { background: #0f3460; color: #ddd; }
  .weekly-panel .archive-content { display: none; }
  .weekly-panel .archive-content.open { display: block; }

  /* 分类总结 */
  .weekly-panel .cat-summary { margin-top: 20px; padding-top: 16px; border-top: 1px solid #0f3460; }
  .weekly-panel .cat-summary h3 { font-size: 14px; color: #e94560; margin-bottom: 10px; }
  .weekly-panel .cat-cards { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .weekly-panel .cat-card { flex: 1; min-width: 100px; padding: 12px; background: #0f3460; border-radius: 10px; text-align: center; }
  .weekly-panel .cat-card .cat-value { font-size: 20px; font-weight: 700; color: #e94560; }
  .weekly-panel .cat-card .cat-label { font-size: 11px; color: #888; margin-top: 2px; }
  .weekly-panel .cat-card .cat-pct { font-size: 11px; color: #555; margin-top: 4px; }
  .weekly-panel .cat-card.cat-top { background: #e94560; }
  .weekly-panel .cat-card.cat-top .cat-value { color: #fff; }
  .weekly-panel .cat-card.cat-top .cat-label { color: rgba(255,255,255,0.7); }
  .weekly-panel .cat-card.cat-top .cat-pct { color: rgba(255,255,255,0.5); }
  .weekly-panel .summary-text { font-size: 13px; color: #aaa; line-height: 1.7; padding: 10px 12px; background: #0f3460; border-radius: 10px; margin-bottom: 12px; }
  .weekly-panel .cat-picker { display: inline-flex; gap: 2px; margin-left: 6px; }
  .weekly-panel .cat-picker button { background: #1a4a7a; border: none; color: #aaa; font-size: 11px; padding: 2px 6px; border-radius: 4px; cursor: pointer; }
  .weekly-panel .cat-picker button:hover { background: #e94560; color: #fff; }
</style>
</head>
<body>

<div class="notification" id="notification"></div>

<div class="container">
  <h1>番茄钟</h1>

  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="pomodoro">专注</button>
    <button class="mode-tab" data-mode="shortBreak">短休</button>
    <button class="mode-tab" data-mode="longBreak">长休</button>
  </div>

  <div class="settings">
    <div class="setting" data-mode="pomodoro"><label>时长设置</label><input type="number" id="focusMin" value="25" min="1" max="120"> <label style="color:#555">分</label></div>
    <div class="setting hidden" data-mode="shortBreak"><label>时长设置</label><input type="number" id="shortMin" value="5" min="1" max="60"> <label style="color:#555">分</label></div>
    <div class="setting hidden" data-mode="longBreak"><label>时长设置</label><input type="number" id="longMin" value="15" min="1" max="120"> <label style="color:#555">分</label></div>
  </div>

  <div class="timer-ring">
    <svg width="260" height="260" viewBox="0 0 260 260">
      <circle class="bg" cx="130" cy="130" r="115"/>
      <circle class="progress" id="progress" cx="130" cy="130" r="115"
        stroke-dasharray="722.57" stroke-dashoffset="0"/>
    </svg>
    <div class="timer-text">
      <div class="timer-display" id="timerDisplay">25:00</div>
      <div class="phase-label" id="phaseLabel">专注时间</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-primary" id="mainBtn">开始</button>
    <button class="btn btn-success" id="finishBtn">完成</button>
    <button class="btn btn-secondary" id="resetBtn">重置</button>
  </div>

  <div class="task-input-wrap">
    <input type="text" id="taskInput" placeholder="添加待办事项..." />
    <button id="addTaskBtn">+</button>
  </div>
  <ul class="task-list" id="taskList"></ul>
  <div class="done-toggle" id="showDoneToggle">已完成 (0)</div>

  <div class="stats">
    <div class="stat"><div class="stat-value" id="completedCount">0</div><div class="stat-label">已完成</div></div>
    <div class="stat"><div class="stat-value" id="sessionCount">0</div><div class="stat-label">当前轮次</div></div>
    <div class="stat"><div class="stat-value" id="totalFocusTime">0m</div><div class="stat-label">总专注时间</div></div>
  </div>
</div>

  <!-- 周报 -->
  <div class="weekly-sidebar" id="weeklySidebar">📊 周报</div>
  <div class="weekly-overlay" id="weeklyOverlay"></div>
  <div class="weekly-panel" id="weeklyPanel">
    <button class="close-btn" id="weeklyClose">&times;</button>
    <h2>本周总结</h2>
    <div class="week-range" id="weekRange"></div>
    <div class="total-stat">
      <div class="value" id="weeklyTotalTime">0m</div>
      <div class="label">本周专注时间</div>
    </div>
    <div class="section">
      <h3>已完成 (<span id="completedCountWeekly">0</span>)</h3>
      <div id="completedTasksList"></div>
    </div>
    <div class="section">
      <h3>待滚动至下周 (<span id="incompleteCountWeekly">0</span>)</h3>
      <div id="incompleteTasksList"></div>
    </div>
    <div class="archive-toggle" id="archiveToggle">📅 上周完成的任务 ▾</div>
    <div class="archive-content" id="archiveContent">
      <h3 style="margin-top:0">已完成 (<span id="prevCompletedCount">0</span>)</h3>
      <div id="prevCompletedList"></div>
      <h3 style="margin-top:12px">未完成 (<span id="prevIncompleteCount">0</span>)</h3>
      <div id="prevIncompleteList"></div>
    </div>
    <div class="cat-summary" id="catSummary">
      <h3>📊 本周专注分析</h3>
      <div class="cat-cards" id="catCards"></div>
      <div class="summary-text" id="summaryText"></div>
    </div>
  </div>

<script>
const MODES = {
  pomodoro:  { label: '专注时间', duration: 25 * 60, color: '#e94560' },
  shortBreak:{ label: '短休息',  duration: 5 * 60,  color: '#0f3460' },
  longBreak: { label: '长休息',  duration: 15 * 60, color: '#0f3460' },
};

const CIRCUMFERENCE = 2 * Math.PI * 115;

let state = {
  mode: 'pomodoro',
  timeLeft: MODES.pomodoro.duration,
  running: false,
  timerId: null,
  completed: 0,
  sessionInRound: 0,
  currentTaskIndex: -1,
};

const $ = id => document.getElementById(id);
const timerDisplay = $('timerDisplay');
const phaseLabel = $('phaseLabel');
const progress = $('progress');
const mainBtn = $('mainBtn');
const resetBtn = $('resetBtn');
const notification = $('notification');
const completedCount = $('completedCount');
const sessionCount = $('sessionCount');
const taskInput = $('taskInput');
const addTaskBtn = $('addTaskBtn');
const taskList = $('taskList');
const focusMin = $('focusMin');
const shortMin = $('shortMin');
const longMin = $('longMin');
const totalFocusTime = $('totalFocusTime');
const finishBtn = $('finishBtn');

function getDurations() {
  return {
    pomodoro:   Math.max(1, parseInt(focusMin.value) || 25) * 60,
    shortBreak: Math.max(1, parseInt(shortMin.value) || 5) * 60,
    longBreak:  Math.max(1, parseInt(longMin.value) || 15) * 60,
  };
}

function formatTime(sec) {
  const m = String(Math.floor(sec / 60)).padStart(2, '0');
  const s = String(sec % 60).padStart(2, '0');
  return `${m}:${s}`;
}

function getSelectedTaskText() {
  const items = document.querySelectorAll('.task-item');
  if (state.currentTaskIndex >= 0 && state.currentTaskIndex < items.length) {
    return items[state.currentTaskIndex].querySelector('.label').textContent;
  }
  return null;
}

function updateDisplay() {
  timerDisplay.textContent = formatTime(state.timeLeft);
  if (state.mode === 'pomodoro') {
    const task = getSelectedTaskText();
    phaseLabel.textContent = task ? `正在: ${task}` : '专注时间 (点击任务开始)';
  } else {
    phaseLabel.textContent = MODES[state.mode].label;
  }
  const total = getDurations()[state.mode];
  const pct = total > 0 ? state.timeLeft / total : 0;
  progress.setAttribute('stroke-dashoffset', CIRCUMFERENCE * (1 - pct));
  progress.setAttribute('stroke', MODES[state.mode].color);
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === state.mode));
}

function showNotification(msg) {
  notification.textContent = msg;
  notification.style.display = 'block';
  setTimeout(() => { notification.style.display = 'none'; }, 4000);
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 880; osc.type = 'sine';
    gain.gain.value = 0.3;
    osc.start(); osc.stop(ctx.currentTime + 0.3);
  } catch(e) {}
}

function switchMode(mode) {
  if (state.running) { clearInterval(state.timerId); state.running = false; mainBtn.textContent = '开始'; }
  state.mode = mode;
  state.timeLeft = getDurations()[mode];
  document.querySelectorAll('.settings .setting').forEach(el => {
    el.classList.toggle('hidden', el.dataset.mode !== mode);
  });
  updateDisplay();
  document.title = `🍅 ${formatTime(state.timeLeft)} - ${MODES[mode].label}`;
}

function completePomodoro() {
  if (state.running) { clearInterval(state.timerId); state.running = false; mainBtn.textContent = '开始'; }
  state.completed++;
  state.sessionInRound++;
  completedCount.textContent = state.completed;
  sessionCount.textContent = state.sessionInRound;
  recordSession();
  saveState();
  const taskName = getSelectedTaskText();
  showNotification(taskName
    ? `提前完成番茄：「${taskName}」+1 (共${state.completed}个)`
    : `完成一个番茄！共完成 ${state.completed} 个`);
  const next = state.sessionInRound % 4 === 0 ? 'longBreak' : 'shortBreak';
  switchMode(next);
}

function tick() {
  state.timeLeft--;
  updateDisplay();
  document.title = `🍅 ${formatTime(state.timeLeft)} - ${MODES[state.mode].label}`;

  if (state.timeLeft <= 0) {
    clearInterval(state.timerId);
    state.running = false;
    mainBtn.textContent = '开始';

    if (state.mode === 'pomodoro') {
      completePomodoro();
    } else {
      showNotification('休息结束，继续加油！');
      switchMode('pomodoro');
    }
  }
}

function toggleTimer() {
  if (state.running) {
    clearInterval(state.timerId);
    state.running = false;
    mainBtn.textContent = '继续';
  } else {
    state.timerId = setInterval(tick, 1000);
    state.running = true;
    mainBtn.textContent = '暂停';
  }
}

function resetTimer() {
  if (state.running) { clearInterval(state.timerId); state.running = false; }
  state.timeLeft = getDurations()[state.mode];
  mainBtn.textContent = '开始';
  updateDisplay();
  document.title = `🍅 ${formatTime(state.timeLeft)} - ${MODES[state.mode].label}`;
}

function updateDoneToggle() {
  const count = document.querySelectorAll('.task-item.done').length;
  const toggle = $('showDoneToggle');
  toggle.textContent = `已完成 (${count})`;
  toggle.classList.toggle('has-done', count > 0);
}

function sortTasks() {
  const items = Array.from(taskList.children);
  const selectedLi = state.currentTaskIndex >= 0 && state.currentTaskIndex < items.length
    ? items[state.currentTaskIndex] : null;
  const undone = items.filter(li => !li.classList.contains('done'));
  const done = items.filter(li => li.classList.contains('done'));
  undone.forEach(li => taskList.appendChild(li));
  done.forEach(li => taskList.appendChild(li));
  if (selectedLi && selectedLi.parentNode) {
    state.currentTaskIndex = Array.from(taskList.children).indexOf(selectedLi);
  }
  updateDoneToggle();
}

function renderTaskBadge(li) {
  const sessions = JSON.parse(li.dataset.sessions || '[]');
  const badge = li.querySelector('.session-badge');
  if (sessions.length > 0) {
    const totalMin = sessions.reduce((sum, s) => sum + (s.duration || 1500), 0) / 60;
    badge.textContent = `${sessions.length}个🍅 ${Math.round(totalMin)}分`;
  } else {
    badge.textContent = '';
  }
}

function selectTask(idx) {
  state.currentTaskIndex = idx;
  updateTaskSelection();
  updateDisplay();
  saveState();
}

function updateTaskSelection() {
  document.querySelectorAll('.task-item').forEach((li, i) => {
    li.classList.toggle('selected', i === state.currentTaskIndex);
  });
}

function recordSession() {
  const items = document.querySelectorAll('.task-item');
  if (state.currentTaskIndex >= 0 && state.currentTaskIndex < items.length) {
    const li = items[state.currentTaskIndex];
    const sessions = JSON.parse(li.dataset.sessions || '[]');
    const d = getDurations();
    const elapsed = d.pomodoro - Math.max(0, state.timeLeft);
    sessions.push({ timestamp: Date.now(), duration: elapsed });
    li.dataset.sessions = JSON.stringify(sessions);
    renderTaskBadge(li);
  }
  updateTotalFocusTime();
  saveState();
}

function updateTotalFocusTime() {
  let totalSeconds = 0;
  document.querySelectorAll('.task-item').forEach(li => {
    const sessions = JSON.parse(li.dataset.sessions || '[]');
    totalSeconds += sessions.reduce((sum, s) => sum + (s.duration || 1500), 0);
  });
  const h = Math.floor(totalSeconds / 3600);
  const m = Math.floor((totalSeconds % 3600) / 60);
  totalFocusTime.textContent = h > 0 ? `${h}h ${m}m` : `${m}m`;
}

function createTaskElement(text, done, sessions, createdAt) {
  const li = document.createElement('li');
  li.className = 'task-item' + (done ? ' done' : '');
  li.dataset.sessions = JSON.stringify(sessions);
  if (createdAt) li.dataset.createdAt = createdAt;
  li.innerHTML = `
    <input type="checkbox"${done ? ' checked' : ''}>
    <span class="label">${text.replace(/</g,'&lt;')}</span>
    <span class="session-badge"></span>
    <button class="del">&times;</button>
  `;
  li.querySelector('input').addEventListener('change', () => {
    li.classList.toggle('done');
    if (li.classList.contains('done')) {
      li.dataset.completedAt = Date.now();
    } else {
      delete li.dataset.completedAt;
    }
    saveState();
    sortTasks();
  });
  li.querySelector('.del').addEventListener('click', e => {
    e.stopPropagation();
    const idx = Array.from(taskList.children).indexOf(li);
    li.remove();
    if (state.currentTaskIndex === idx) state.currentTaskIndex = -1;
    else if (state.currentTaskIndex > idx) state.currentTaskIndex--;
    updateTaskSelection();
    updateTotalFocusTime();
    updateDisplay();
    saveState();
  });
  li.addEventListener('click', e => {
    if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
    selectTask(Array.from(taskList.children).indexOf(li));
    if (!state.running && state.mode === 'pomodoro') toggleTimer();
  });
  renderTaskBadge(li);
  return li;
}

function collectTasks() {
  const tasks = [];
  document.querySelectorAll('.task-item').forEach(li => {
    tasks.push({
      text: li.querySelector('.label').textContent,
      done: li.classList.contains('done'),
      sessions: JSON.parse(li.dataset.sessions || '[]'),
      createdAt: li.dataset.createdAt ? Number(li.dataset.createdAt) : null,
      completedAt: li.dataset.completedAt ? Number(li.dataset.completedAt) : null,
    });
  });
  return tasks;
}

function saveState() {
  const tasks = collectTasks();
  const data = {
    completed: state.completed,
    sessionInRound: state.sessionInRound,
    currentTaskIndex: state.currentTaskIndex,
    tasks
  };
  // 服务端保存（自动静默降级到 localStorage）
  fetch('/api/save', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data),
    keepalive: true,
  }).catch(() => {
    localStorage.setItem('pomodoro-state', JSON.stringify(data));
  });
}

function applyLoadedState(saved) {
  state.completed = saved.completed || 0;
  state.sessionInRound = saved.sessionInRound || 0;
  state.currentTaskIndex = saved.currentTaskIndex != null ? saved.currentTaskIndex : -1;
  completedCount.textContent = state.completed;
  sessionCount.textContent = state.sessionInRound;
  (saved.tasks || []).forEach(t => {
    const sessions = t.sessions || [];
    const li = createTaskElement(t.text, t.done, sessions, t.createdAt || Date.now());
    if (t.completedAt) li.dataset.completedAt = t.completedAt;
    taskList.appendChild(li);
  });
  updateTaskSelection();
  updateTotalFocusTime();
  sortTasks();
}

async function loadState() {
  // 优先从服务端加载
  try {
    const res = await fetch('/api/load');
    if (res.ok) {
      const saved = await res.json();
      applyLoadedState(saved);
      return;
    }
  } catch(e) {}
  // 降级到 localStorage
  try {
    const saved = JSON.parse(localStorage.getItem('pomodoro-state'));
    if (saved) applyLoadedState(saved);
  } catch(e) {}
}

document.querySelectorAll('.mode-tab').forEach(tab => {
  tab.addEventListener('click', () => switchMode(tab.dataset.mode));
});
mainBtn.addEventListener('click', toggleTimer);
finishBtn.addEventListener('click', () => {
  if (state.mode !== 'pomodoro') { showNotification('专注模式下才能完成番茄'); return; }
  completePomodoro();
});
resetBtn.addEventListener('click', resetTimer);

function addTask() {
  const text = taskInput.value.trim();
  if (!text) return;
  const li = createTaskElement(text, false, [], Date.now());
  taskList.appendChild(li);
  saveState();
  taskInput.value = '';
  taskInput.focus();
}
addTaskBtn.addEventListener('click', addTask);
taskInput.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

[focusMin, shortMin, longMin].forEach(inp => {
  inp.addEventListener('change', () => {
    if (!state.running) {
      state.timeLeft = getDurations()[state.mode];
      updateDisplay();
      document.title = `🍅 ${formatTime(state.timeLeft)} - ${MODES[state.mode].label}`;
    }
  });
});

loadState();
document.querySelectorAll('.settings .setting').forEach(el => {
  el.classList.toggle('hidden', el.dataset.mode !== state.mode);
});
updateDisplay();
document.title = `🍅 ${formatTime(state.timeLeft)} - ${MODES[state.mode].label}`;

// 周报功能
const weeklySidebar = document.getElementById('weeklySidebar');
const weeklyOverlay = document.getElementById('weeklyOverlay');
const weeklyPanel = document.getElementById('weeklyPanel');
const weeklyClose = document.getElementById('weeklyClose');
const weekRange = document.getElementById('weekRange');
const weeklyTotalTime = document.getElementById('weeklyTotalTime');
const completedCountWeekly = document.getElementById('completedCountWeekly');
const incompleteCountWeekly = document.getElementById('incompleteCountWeekly');
const completedTasksList = document.getElementById('completedTasksList');
const incompleteTasksList = document.getElementById('incompleteTasksList');
const archiveToggle = document.getElementById('archiveToggle');
const archiveContent = document.getElementById('archiveContent');
const prevCompletedCount = document.getElementById('prevCompletedCount');
const prevIncompleteCount = document.getElementById('prevIncompleteCount');
const prevCompletedList = document.getElementById('prevCompletedList');
const prevIncompleteList = document.getElementById('prevIncompleteList');

let weeklyData = null;

function openWeeklyPanel() {
  weeklyPanel.classList.add('open');
  weeklyOverlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  if (!weeklyData) fetchWeeklySummary();
  fetchWeeklyAnalysis();
}

function closeWeeklyPanel() {
  weeklyPanel.classList.remove('open');
  weeklyOverlay.classList.remove('open');
  document.body.style.overflow = '';
}

weeklySidebar.addEventListener('click', openWeeklyPanel);
weeklyOverlay.addEventListener('click', closeWeeklyPanel);
weeklyClose.addEventListener('click', closeWeeklyPanel);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeWeeklyPanel(); });

function formatMinutes(min) {
  const h = Math.floor(min / 60);
  const m = min % 60;
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

const BAR_COLORS = ['#e94560', '#f39c12', '#2ecc71', '#3498db', '#9b59b6', '#1abc9c', '#e67e22', '#2c3e50'];

function renderTaskRow(task, maxMinutes) {
  const div = document.createElement('div');
  div.className = 'chart-bar';
  const pct = maxMinutes > 0 ? (task.totalMinutes / maxMinutes) * 100 : 0;
  const color = BAR_COLORS[Math.floor(Math.random() * BAR_COLORS.length)];
  div.innerHTML = `
    <span class="name" title="${task.text.replace(/</g,'&lt;')}">${task.text.replace(/</g,'&lt;')}</span>
    <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
    <span class="bar-label">${task.sessionCount}个 ${formatMinutes(task.totalMinutes)}</span>`;
  addCategoryPicker(div, task);
  return div;
}

function renderTaskList(container, tasks, emptyMsg, maxMinutes) {
  container.innerHTML = '';
  if (!tasks || tasks.length === 0) {
    container.innerHTML = `<div class="empty-msg">${emptyMsg}</div>`;
    return;
  }
  tasks.forEach(t => container.appendChild(renderTaskRow(t, maxMinutes)));
}

async function fetchWeeklySummary() {
  try {
    const res = await fetch('/api/weekly-summary');
    if (!res.ok) throw new Error('Failed');
    weeklyData = await res.json();
    const { currentWeek, previousWeek } = weeklyData;
    weekRange.textContent = currentWeek.weekRange;
    weeklyTotalTime.textContent = formatMinutes(currentWeek.totalMinutes);
    completedCountWeekly.textContent = currentWeek.completedTasks.length;
    incompleteCountWeekly.textContent = currentWeek.incompleteTasks.length;
    const curMax = Math.max(
      ...currentWeek.completedTasks.map(t => t.totalMinutes),
      ...currentWeek.incompleteTasks.map(t => t.totalMinutes),
      1
    );
    renderTaskList(completedTasksList, currentWeek.completedTasks, '本周还没有完成的任务', curMax);
    renderTaskList(incompleteTasksList, currentWeek.incompleteTasks, '本周没有待滚动任务', curMax);
    prevCompletedCount.textContent = previousWeek.completedTasks.length;
    prevIncompleteCount.textContent = previousWeek.incompleteTasks.length;
    const prevMax = Math.max(
      ...previousWeek.completedTasks.map(t => t.totalMinutes),
      ...previousWeek.incompleteTasks.map(t => t.totalMinutes),
      1
    );
    renderTaskList(prevCompletedList, previousWeek.completedTasks, '无', prevMax);
    renderTaskList(prevIncompleteList, previousWeek.incompleteTasks, '无', prevMax);
  } catch(e) { /* 静默降级 */ }
}

const CAT_LABELS = { dev: '研发类', meeting: '会议类', doc: '办公材料类' };
const CAT_COLORS = { dev: '#3498db', meeting: '#f39c12', doc: '#2ecc71', uncategorized: '#888' };

async function fetchWeeklyAnalysis() {
  try {
    const res = await fetch('/api/weekly-analysis');
    if (!res.ok) throw new Error('Failed');
    const data = await res.json();
    const catSummary = document.getElementById('catSummary');
    catSummary.style.display = 'block';
    const cards = document.getElementById('catCards');
    const text = document.getElementById('summaryText');
    cards.innerHTML = '';
    const sorted = Object.entries(data.categories).sort((a, b) => b[1].totalMinutes - a[1].totalMinutes);
    const maxMin = Math.max(...sorted.map(([,c]) => c.totalMinutes), 1);
    sorted.forEach(([key, cat]) => {
      const card = document.createElement('div');
      card.className = 'cat-card' + (cat.totalMinutes === maxMin ? ' cat-top' : '');
      const pct = Math.round(cat.totalMinutes / data.totalMinutes * 100);
      card.innerHTML = `
        <div class="cat-value">${formatMinutes(cat.totalMinutes)}</div>
        <div class="cat-label">${cat.label}</div>
        <div class="cat-pct">${pct}% · ${cat.count}个任务</div>`;
      cards.appendChild(card);
    });
    text.textContent = data.summary;
  } catch(e) {}
}

function addCategoryPicker(div, task) {
  if (task.category !== 'uncategorized') return;
  const picker = document.createElement('span');
  picker.className = 'cat-picker';
  picker.innerHTML = Object.entries(CAT_LABELS).map(([k, v]) =>
    `<button data-cat="${k}">${v}</button>`
  ).join('');
  picker.addEventListener('click', async (e) => {
    const btn = e.target;
    if (btn.tagName !== 'BUTTON') return;
    const cat = btn.dataset.cat;
    try {
      const res = await fetch('/api/set-category', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ createdAt: task.createdAt, category: cat }),
      });
      if (!res.ok) throw new Error('Failed');
      btn.textContent = '✓ ' + CAT_LABELS[cat];
      btn.style.background = '#2ecc71';
      btn.style.color = '#fff';
      picker.querySelectorAll('button').forEach(b => { if (b !== btn) b.remove(); });
      // 刷新分析
      fetchWeeklyAnalysis();
    } catch(e) {}
  });
  div.querySelector('.bar-label').after(picker);
}

$('showDoneToggle').addEventListener('click', () => {
  taskList.classList.toggle('show-done');
  $('showDoneToggle').textContent = taskList.classList.contains('show-done')
    ? '隐藏已完成'
    : `已完成 (${document.querySelectorAll('.task-item.done').length})`;
});

archiveToggle.addEventListener('click', () => {
  archiveContent.classList.toggle('open');
  archiveToggle.textContent = archiveContent.classList.contains('open')
    ? '📅 上周完成的任务 ▴'
    : '📅 上周完成的任务 ▾';
});

// 周五自动打开周报 (5 = Friday)
if (new Date().getDay() === 5) {
  setTimeout(openWeeklyPanel, 600);
}
</script>
